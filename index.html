<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Bingo Game</h1>
  <div class="container">
    <!-- Left panel: all cartelas -->
    <div class="all-cards">
      <h3>Pick a Cartela (1-400)</h3>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- Right panel: player 5x5 cartela -->
    <div class="player-card-wrapper">
      <h3 id="gameStatus">Wait until the current game finishes...</h3>
      <div class="player-card" id="playerCardWrapper">
        <div class="bingo-header">
          <div>B</div>
          <div>I</div>
          <div>N</div>
          <div>G</div>
          <div>O</div>
        </div>
        <div class="player-card" id="playerCard"></div>
      </div>

      <!-- Previous called numbers -->
      <h4>Previous Calls:</h4>
      <div id="previousCalls" class="previous-calls"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
