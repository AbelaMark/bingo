<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div>Derash <span id="derash">0</span></div>
  <div>Players <span id="players">0</span></div>
  <div>Bet <span>10</span></div>
  <div>Call <span id="callCount">0</span></div>
  <div>Game Nº <span>1 of 1</span></div>
</div>

  <div id="cartelaScreen" class="cartela-screen">
  <h2>Select Your Cartela</h2>
  <div id="cartelaGrid" class="cartela-grid"></div>
</div>

<div class="main">

  <!-- LEFT BINGO BOARD -->
  <div class="left-board">
    <div class="bingo-header">
      <div class="b">B</div>
      <div class="i">I</div>
      <div class="n">N</div>
      <div class="g">G</div>
      <div class="o">O</div>
    </div>
    <div id="bingoGrid" class="bingo-grid"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <div class="status" id="status">WAITING (20s)</div>

    <div class="current-call">
      <span>Current Call</span>
      <div id="currentCall" class="call-circle">--</div>
    </div>

    <div id="previousCalls" class="previous-calls"></div>

    <!-- PLAYER CARD -->
    <div class="player-section">
      <div class="bingo-header small">
        <div class="b">B</div>
        <div class="i">I</div>
        <div class="n">N</div>
        <div class="g">G</div>
        <div class="o">O</div>
      </div>
      <div id="playerCard" class="player-card"></div>
    </div>

    <button class="bingo-btn">BINGO!</button>

    <!-- WINNER POPUP -->
  <div id="winnerPopup" class="popup hidden">
  <div class="popup-content">
    <h1>BINGO!</h1>
    <p><span id="winnerName">Player</span> has won the game</p>

    <div id="winnerCard" class="player-card"></div>

    <div id="countdownReset">10</div>
  </div>
</div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
